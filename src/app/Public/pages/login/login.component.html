<!-- ═══════════════════════════════════════
     MAIN
═══════════════════════════════════════ -->
<div class="min-h-screen bg-[#F0FDF4] flex items-center justify-center">
  <div class="w-full max-w-md">

    <!-- Hero Text -->
    <!-- <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-white border border-green-200 rounded-2xl shadow-sm mb-4">
        <span class="text-2xl">🚚</span>
      </div>
      <h1 class="text-2xl font-bold text-green-950">Welcome back</h1>
      <p class="text-green-700 text-sm mt-1">Sign in to your ShipEase account</p>
    </div> -->

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-sm border border-green-100 overflow-hidden">

      <!-- Card top accent -->
      <div class="h-1 bg-[#16A34A]"></div>

      <div class="p-8">

        <!-- Error -->
        <div *ngIf="errorMessage"
          class="mb-5 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 flex items-center gap-2">
          <span>⚠️</span>
          <span>{{ errorMessage }}</span>
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label class="text-xs font-semibold text-green-800 block mb-1.5 uppercase tracking-wide">
            Email Address
          </label>
          <input
            [(ngModel)]="form.email"  
            type="email"
            placeholder="you@example.com"
            (keyup.enter)="login()"                                 
            class="w-full border border-green-200 bg-[#F0FDF4] rounded-xl px-4 py-3 text-sm text-green-900 placeholder-green-400 focus:outline-none focus:ring-2 focus:ring-[#16A34A] focus:border-transparent transition"
          />
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label class="text-xs font-semibold text-green-800 block mb-1.5 uppercase tracking-wide">
            Password
          </label>
          <div class="relative">
            <input
              [(ngModel)]="form.password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Enter your password"
              (keyup.enter)="login()"
              class="w-full border border-green-200 bg-[#F0FDF4] rounded-xl px-4 py-3 text-sm pr-12 text-green-900 placeholder-green-400 focus:outline-none focus:ring-2 focus:ring-[#16A34A] focus:border-transparent transition"
            />
            <button type="button"
              (click)="showPassword = !showPassword"
              class="absolute right-3 top-3 text-green-400 hover:text-green-700 transition text-sm px-1">
              {{ showPassword ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button
          (click)="login()"
          [disabled]="isLoading"
          class="w-full bg-[#16A34A] text-white py-3 rounded-xl text-sm font-semibold hover:bg-green-700 active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
          <span *ngIf="!isLoading">Sign In →</span>
          <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
            <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
            Signing in...
          </span>
        </button>

        <!-- Register link -->
        <p class="text-center text-sm text-green-700 mt-5">
          Don't have an account?
          <a routerLink="/register" class="text-[#16A34A] font-semibold hover:underline">Sign up</a>
        </p>

        <!-- Divider -->
        <div class="mt-6 pt-5 border-t border-green-100">
          <p class="text-xs text-green-600 text-center mb-3 font-medium">Sign in as</p>
          <div class="flex gap-2 justify-center flex-wrap">
            <span class="text-xs bg-[#F0FDF4] text-green-700 border border-green-200 px-3 py-1.5 rounded-full font-medium">👤 Customer</span>
            <span class="text-xs bg-[#F0FDF4] text-green-700 border border-green-200 px-3 py-1.5 rounded-full font-medium">🛡️ Admin</span>
            <span class="text-xs bg-[#F0FDF4] text-green-700 border border-green-200 px-3 py-1.5 rounded-full font-medium">🚚 Staff</span>
          </div>
        </div>

      </div>
    </div>

    <!-- Footer note -->
    <p class="text-center text-xs text-green-600 mt-6">
      © 2025 ShipEase · Secure Login
    </p>

  </div>
</div>
