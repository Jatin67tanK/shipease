<!-- app-layout shell (app.component.html or layout wrapper) -->
<div class="flex h-screen bg-[#f5f7f6] overflow-hidden">

  <!-- ✅ SIDEBAR -->
  <app-sidebar
    [collapsed]="collapsed"
    (toggle)="toggleSidebar()">
  </app-sidebar>

  <!-- ✅ MAIN AREA -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- ✅ PAGE CONTENT -->
    <div class="flex-1 overflow-auto">
      <div class="min-h-screen w-full">
        <router-outlet></router-outlet>
      </div>
    </div>

  </div>

</div>
