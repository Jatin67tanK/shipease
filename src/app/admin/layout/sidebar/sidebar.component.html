<!-- ✅ MOBILE OPEN BUTTON (Visible only when sidebar closed) -->
<!-- ✅ MOBILE HAMBURGER (ONLY ONE 😌) -->
<button
  (click)="mobileOpen = true"
  class="lg:hidden fixed top-4 left-4 z-50 p-2 rounded-lg 
         bg-white border border-gray-200 shadow-sm hover:bg-gray-100 transition"
>
  ☰
</button>


<!-- ✅ MOBILE OVERLAY -->
<div
  *ngIf="mobileOpen"
  class="fixed inset-0 bg-black/40 z-40 lg:hidden"
  (click)="mobileOpen = false">
</div>


<!-- ✅ MOBILE SIDEBAR -->
<div
  class="fixed top-0 left-0 h-screen w-64 bg-white z-50 shadow-lg 
         flex flex-col transform transition-transform duration-300 lg:hidden"
  [class.translate-x-0]="mobileOpen"
  [class.-translate-x-full]="!mobileOpen"
>

    <!-- ✅ HEADER -->
    <div class="flex items-center justify-between p-4 border-b">

        <div class="flex items-center gap-3">
 <i class="fas fa-envelope text-slate-300 text-xs"></i>


            <div class="leading-tight">
                <div class="font-bold text-lg">ShipEase</div>
                <div class="text-green-600 text-sm">Admin Panel</div>
            </div>
        </div>

        <!-- ✅ CLOSE BUTTON -->
        <button
            (click)="mobileOpen = false"
            class="p-2 rounded-lg hover:bg-gray-100 transition"
        >
            ✕
        </button>

    </div>

    <!-- ✅ MENU -->
    <nav class="flex flex-col p-3 gap-2 flex-1">

        <a
            *ngFor="let item of menuItems"
            [routerLink]="item.link"
            routerLinkActive="bg-green-100 text-green-600"
            class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 transition"
            (click)="mobileOpen = false"
        >
            <span class="text-lg">{{ item.icon }}</span>
            <span>{{ item.label }}</span>
        </a>

    </nav>

    <!-- ✅ LOGOUT -->
    <div class="p-3 border-t">

        <a
            routerLink="/"
            class="flex items-center gap-3 p-3 rounded-lg hover:bg-red-50 text-red-500 transition"
            (click)="mobileOpen = false"
        >
            <!-- <span class="text-lg">🚪</span> -->
                <i class="fas fa-envelope text-slate-300 text-xs"></i>

            <span>Log out</span>
        </a>

    </div>

</div>


<!-- ✅ PC SIDEBAR -->
<div
  class="hidden lg:flex h-screen flex-col bg-white border-r transition-all duration-300"
  [class.w-64]="!collapsed"
  [class.w-20]="collapsed"
>

    <!-- ✅ HEADER -->
    <div class="flex items-center justify-between p-4 border-b">

        <div class="flex items-center gap-3 overflow-hidden">

            <span *ngIf="!collapsed" class="text-2xl">🚚</span>

            <div *ngIf="!collapsed" class="leading-tight">
                <div class="font-bold text-lg">ShipEase</div>
                <div class="text-green-600 text-sm">Admin Panel</div>
            </div>

        </div>

        <!-- ✅ COLLAPSE BUTTON -->
        <button
            (click)="onToggle()"
            class="p-2 rounded-lg hover:bg-gray-100 transition"
        >
            ☰
        </button>

    </div>

    <!-- ✅ MENU -->
    <nav class="flex flex-col p-3 gap-2 flex-1">

        <a
            *ngFor="let item of menuItems"
            [routerLink]="item.link"
            routerLinkActive="bg-green-100 text-green-600"
            class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 transition"
        >
            <span class="text-lg">{{ item.icon }}</span>

            <span *ngIf="!collapsed">
                {{ item.label }}
            </span>

        </a>

    </nav>

    <!-- ✅ LOGOUT -->
    <div class="p-3 border-t">

        <a
            routerLink="/"
            class="flex items-center gap-3 p-3 rounded-lg hover:bg-red-50 text-red-500 transition"
        >
            <span class="text-lg">🚪</span>

            <span *ngIf="!collapsed">
                Log out
            </span>

        </a>

    </div>

</div>
