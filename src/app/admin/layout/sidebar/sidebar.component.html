<!-- ✅ MOBILE OPEN BUTTON (Visible only when sidebar closed) -->
<!-- ✅ MOBILE HAMBURGER (ONLY ONE 😌) -->
<div class="flex flex-col h-full bg-white border-r border-gray-100 transition-all duration-300"
     [class.w-64]="!collapsed"
     [class.w-16]="collapsed">

  <!-- Logo Row -->
  <div class="flex items-center justify-between px-4 py-5 border-b border-gray-100">
    <div *ngIf="!collapsed" class="flex items-center gap-2">
      <div class="w-8 h-8 bg-[#16A34A] rounded-xl flex items-center justify-center">
        <span class="text-white text-sm font-bold">S</span>
      </div>
      <span class="font-bold text-gray-800 text-base">ShipEase</span>
    </div>
    <button (click)="toggleSidebar()"
            class="w-8 h-8 flex items-center justify-center rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-500 transition-colors text-xs">
     <i class="fa-solid" [class.fa-chevron-left]="!collapsed" [class.fa-chevron-right]="collapsed"></i>
    </button>
  </div>

  <!-- Admin Badge -->
  <div *ngIf="!collapsed" class="mx-4 mt-4 mb-2 bg-[#F0FDF4] rounded-xl px-3 py-2">
    <p class="text-xs text-green-600 font-semibold flex items-center gap-1.5">
  <i class="fa-solid fa-shield-halved"></i> Admin Panel
</p>
  </div>

  <!-- Menu -->
  <nav class="flex-1 overflow-y-auto px-2 py-2 space-y-0.5">
    <a *ngFor="let item of menuItems"
       [routerLink]="item.link"
       routerLinkActive="bg-[#F0FDF4] text-[#16A34A] font-semibold"
       [routerLinkActiveOptions]="{exact: item.link === '/admin/dashboard'}"
       class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 text-sm
              hover:bg-[#F0FDF4] hover:text-[#16A34A] transition-all group">
      <i class="fa-solid {{ item.icon }} w-4 text-center flex-shrink-0"></i>
      <span *ngIf="!collapsed" class="truncate">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Logout -->
  <div class="p-3 border-t border-gray-100">
    <button (click)="logout()"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-red-500 text-sm
                   hover:bg-red-50 transition-all">
      <i class="fa-solid fa-right-from-bracket w-4 text-center flex-shrink-0"></i>
      <span *ngIf="!collapsed">Logout</span>
    </button>
  </div>
</div>
