<!-- dashboard.component.html — Fully Responsive -->
<div class="h-full flex flex-col bg-[#F5FFF7]">

  <!-- HEADER -->
  <app-header></app-header>

  <!-- CONTENT -->
  <div class="flex-1 overflow-auto">
    <div class="p-3 sm:p-4 lg:p-5 max-w-[1400px] mx-auto flex flex-col min-h-full">

      <!-- STAT CARDS GRID -->
      <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">

        <div *ngFor="let card of cards"
             class="group bg-white rounded-xl p-3 sm:p-4 border border-gray-100 shadow-sm
                    hover:shadow-md hover:border-green-100 transition-all duration-300">

          <div class="flex items-center gap-3 sm:gap-4" (click)="goToPracel(card.title)">

            <div class="w-9 h-9 sm:w-10 sm:h-10 rounded-lg flex-shrink-0 flex items-center justify-center text-sm sm:text-base transition-transform group-hover:scale-110"
                 [ngClass]="card.iconBg">
              <i [class]="card.icon"></i>
            </div>

            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between mb-0.5">
                <span class="text-[10px] sm:text-xs font-medium text-gray-500 truncate uppercase tracking-wider">
                  {{ card.title }}
                </span>
                <span *ngIf="card.badge"
                      class="text-[9px] sm:text-[10px] font-bold px-1.5 sm:px-2 py-0.5 rounded-md leading-tight ml-1"
                      [ngClass]="card.badgeStyle">
                  {{ card.badge }}
                </span>
              </div>

              <div class="text-lg sm:text-xl font-bold tracking-tight text-gray-900"
                   [ngClass]="card.valueStyle">
                {{ card.value }}
              </div>
            </div>

          </div>
        </div>

      </div>

      <!-- CHARTS -->
      <div class="mt-4 sm:mt-6">
        <app-admin-charts></app-admin-charts>
      </div>

      <!-- FOOTER -->
      <div class="text-center text-xs text-gray-400 mt-6 pb-4">
        © 2023 ShipEase Logistics. Admin Dashboard
      </div>

    </div>
  </div>

</div>
