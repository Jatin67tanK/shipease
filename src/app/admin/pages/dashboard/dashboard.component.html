<div class="h-full flex flex-col bg-[#f5fff7]">

    <!-- ✅ HEADER -->
    <div class="h-16 bg-white border-b flex items-center justify-between px-6 sticky top-0 z-30">

        <div class="text-lg font-semibold text-gray-800">
            Dashboard
        </div>

        <div class="flex items-center gap-3">

            <div class="text-right leading-tight">
                <div class="text-sm font-semibold text-gray-800">
                    Alex Morgan
                </div>
                <div class="text-xs text-gray-500">
                    Admin
                </div>
            </div>

            <img src="https://i.pravatar.cc/40"
                 class="w-9 h-9 rounded-full border border-gray-200" />

        </div>

    </div>

    <!-- ✅ CONTENT -->
    <div class="flex-1 overflow-auto">

        <div class="p-6 lg:p-10 max-w-[1400px] mx-auto flex flex-col min-h-full">

            <!-- ✅ OVERVIEW -->
            <div class="mb-8">

                <h2 class="text-[22px] font-semibold mb-1">
                    Overview
                </h2>

                <!-- <p class="text-sm text-gray-500">
                    Here is the daily summary of logistic operations.
                </p> -->

            </div>

            <!-- ✅ CARDS GRID -->
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6">

                <div
                    *ngFor="let card of cards"
                    class="bg-white rounded-2xl p-6 shadow-sm hover:-translate-y-1 hover:shadow-md transition-all duration-300">

                    <div class="flex justify-between items-center mb-6">

                        <div class="w-12 h-12 rounded-xl flex items-center justify-center text-lg"
                             [ngClass]="card.iconBg">

                            <i [class]="card.icon"></i>

                        </div>

                        <span
                            *ngIf="card.badge"
                            class="text-xs font-semibold px-3 py-1.5 rounded-full"
                            [ngClass]="card.badgeStyle">

                            {{ card.badge }}

                        </span>

                    </div>

                    <div class="text-sm text-gray-500 mb-2">
                        {{ card.title }}
                    </div>

                    <div class="text-3xl font-bold"
                         [ngClass]="card.valueStyle">

                        {{ card.value }}

                    </div>

                </div>

            </div>

            <!-- ✅ LOWER PANEL -->
            <div class="flex-1 mt-6 bg-white rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center text-gray-400 text-sm">

                Analytics / Charts Area

            </div>

            <!-- ✅ FOOTER -->
            <div class="text-center text-xs text-gray-400 mt-6 pb-4">
                © 2023 ShipEase Logistics. Admin Dashboard
            </div>

        </div>

    </div>

</div>
