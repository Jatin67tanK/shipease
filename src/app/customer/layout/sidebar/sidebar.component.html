<div
  [class.w-64]="!collapsed"
  [class.w-20]="collapsed"
  class="h-screen flex flex-col bg-white border-r transition-all duration-300">

    <!-- ✅ HEADER -->
    <div class="flex items-center justify-between p-4 border-b sticky top-0 bg-white z-40">

        <!-- LEFT SECTION -->
        <div class="flex items-center gap-3 overflow-hidden">

            <!-- ✅ LOGO (NOW HIDES WHEN COLLAPSED) -->
            <span
                *ngIf="!collapsed"
                class="text-2xl flex-shrink-0">
                🚚
            </span>

            <!-- ✅ TEXT -->
            <div
                *ngIf="!collapsed"
                class="leading-tight whitespace-nowrap">
                <div class="font-bold text-lg">ShipEase</div>
                <div class="text-green-600 text-sm">Customer Panel</div>
            </div>

        </div>

        <!-- ✅ HAMBURGER -->
        <button
            (click)="onToggle()"
            class="p-2 rounded-lg hover:bg-gray-100 transition border border-gray-200 shadow-sm flex items-center justify-center">

            <div class="relative w-5 h-5">

                <!-- TOP -->
                <span
                    class="absolute left-0 top-0.5 h-[2px] w-5 bg-gray-800 rounded transition-all duration-300"
                    [class.rotate-45]="collapsed"
                    [class.top-2]="collapsed">
                </span>

                <!-- MIDDLE -->
                <span
                    class="absolute left-0 top-2 h-[2px] w-5 bg-gray-800 rounded transition-all duration-300"
                    [class.opacity-0]="collapsed">
                </span>

                <!-- BOTTOM -->
                <span
                    class="absolute left-0 top-3.5 h-[2px] w-5 bg-gray-800 rounded transition-all duration-300"
                    [class.-rotate-45]="collapsed"
                    [class.top-2]="collapsed">
                </span>

            </div>

        </button>

    </div>

    <!-- ✅ MENU -->
    <nav class="flex flex-col p-3 gap-2 flex-1">

        <a
            *ngFor="let item of menuItems"
            [routerLink]="item.link"
            routerLinkActive="bg-green-100 text-green-600"
            class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 transition">

            <span class="text-lg flex-shrink-0">{{ item.icon }}</span>

            <span
                *ngIf="!collapsed"
                class="whitespace-nowrap">
                {{ item.label }}
            </span>

        </a>

    </nav>

    <!-- ✅ LOGOUT -->
    <div class="p-3 border-t">

        <a
            routerLink="/"
            class="flex items-center gap-3 p-3 rounded-lg hover:bg-red-50 text-red-500 transition">

            <span class="text-lg flex-shrink-0">🚪</span>

            <span
                *ngIf="!collapsed"
                class="whitespace-nowrap">
                Log out
            </span>

        </a>

    </div>

</div>
