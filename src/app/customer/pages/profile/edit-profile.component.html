<div class="h-full flex flex-col bg-[#f5fff7]">

    <!-- HEADER -->
    <div class="h-16 bg-white border-b flex items-center justify-between px-6 sticky top-0 z-30">
        <div class="text-lg font-semibold text-gray-800">
            Edit Profile
        </div>
    </div>

    <div class="p-6 lg:p-8">

        <h1 class="text-2xl font-semibold text-gray-900 mb-6">
            Edit Profile
        </h1>

        <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <!-- NAME -->
                <div class="md:col-span-2">
                    <label class="text-sm font-medium text-gray-700">
                        Full Name <span class="text-red-500">*</span>
                    </label>

                    <input
                        type="text"
                        [(ngModel)]="profile.name"
                        class="w-full mt-2 px-4 py-3 rounded-xl border border-gray-200 text-sm
                               focus:outline-none focus:ring-2 focus:ring-green-100 focus:border-green-500"
                    />
                </div>

                <!-- PHONE -->
                <div>
                    <label class="text-sm font-medium text-gray-700">
                        Phone Number <span class="text-red-500">*</span>
                    </label>

                    <input
                        type="text"
                        [(ngModel)]="profile.phone_number"
                        class="w-full mt-2 px-4 py-3 rounded-xl border border-gray-200 text-sm
                               focus:outline-none focus:ring-2 focus:ring-green-100 focus:border-green-500"
                    />
                </div>
                
                <!-- STATE -->
                <div>
                    <label class="text-sm font-medium text-gray-700">
                        State <span class="text-red-500">*</span>
                    </label>

                    <input
                        type="text"
                        [(ngModel)]="profile.state"
                        class="w-full mt-2 px-4 py-3 rounded-xl border border-gray-200 text-sm"
                    />
                </div>

                <!-- COUNTRY -->
                <div>
                    <label class="text-sm font-medium text-gray-700">
                        Country <span class="text-red-500">*</span>
                    </label>

                    <input
                        type="text"
                        [(ngModel)]="profile.country"
                        class="w-full mt-2 px-4 py-3 rounded-xl border border-gray-200 text-sm"
                    />
                </div>

            </div>

            <!-- BUTTONS -->
            <div class="flex justify-end gap-3 mt-8">

                <button
                    (click)="cancel()"
                    class="px-5 py-2.5 rounded-lg border border-gray-300 text-sm font-medium">
                    Cancel
                </button>

                <button
                    (click)="saveChanges()"
                    class="px-6 py-2.5 rounded-lg bg-green-600 text-white text-sm font-medium">
                    Save Changes
                </button>

            </div>

        </div>

    </div>

</div>
