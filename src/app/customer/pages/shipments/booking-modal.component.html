<!-- BACKDROP -->
<div class="fixed inset-0 bg-black/30 flex items-center justify-center z-50">

    <!-- MODAL -->
    <div class="bg-white w-[900px] rounded-2xl shadow-xl p-8 relative">

        <!-- CLOSE BUTTON -->
        <button
            (click)="closeModal()"
            class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
            ✕
        </button>

        <!-- TITLE -->
        <div class="text-2xl font-bold mb-1">
            Book a New Parcel
        </div>

        <div class="text-gray-500 text-sm mb-6">
            Enter parcel details to continue to checkout.
        </div>

        <!-- FORM GRID -->
        <div class="grid grid-cols-2 gap-4">

            <div>
                <label class="text-xs text-gray-500">Sender Name</label>
                <input class="w-full border rounded-lg px-3 py-2 mt-1 text-sm" placeholder="John Doe">
            </div>

            <div>
                <label class="text-xs text-gray-500">Receiver Name</label>
                <input class="w-full border rounded-lg px-3 py-2 mt-1 text-sm" placeholder="Jane Smith">
            </div>

            <div>
                <label class="text-xs text-gray-500">Pickup Address</label>
                <textarea class="w-full border rounded-lg px-3 py-2 mt-1 text-sm" placeholder="Building, Street, City..."></textarea>
            </div>

            <div>
                <label class="text-xs text-gray-500">Drop Address</label>
                <textarea class="w-full border rounded-lg px-3 py-2 mt-1 text-sm" placeholder="Building, Street, City..."></textarea>
            </div>

            <div>
                <label class="text-xs text-gray-500">Distance Category</label>
                <select class="w-full border rounded-lg px-3 py-2 mt-1 text-sm">
                    <option>Select distance category</option>
                </select>
            </div>

            <div>
                <label class="text-xs text-gray-500">Parcel Type</label>
                <select class="w-full border rounded-lg px-3 py-2 mt-1 text-sm">
                    <option>Select type</option>
                </select>
            </div>

            <div>
                <label class="text-xs text-gray-500">Parcel Weight (kg)</label>
                <input class="w-full border rounded-lg px-3 py-2 mt-1 text-sm" placeholder="0.0">
            </div>

            <div>
                <label class="text-xs text-gray-500">Delivery Type</label>
                <select class="w-full border rounded-lg px-3 py-2 mt-1 text-sm">
                    <option>Normal Delivery</option>
                </select>
            </div>

        </div>

        <!-- ACTIONS -->
        <div class="flex justify-between mt-6">

            <button
                (click)="closeModal()"
                class="text-gray-500 text-sm hover:text-gray-700">
                Cancel
            </button>

            <button
                class="bg-green-600 text-white px-6 py-2 rounded-lg text-sm hover:bg-green-700">
                Proceed to Checkout
            </button>

        </div>

    </div>

</div>
