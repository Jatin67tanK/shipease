<div class="h-full flex flex-col bg-[#f6fff9]">

    <!-- ✅ PAGE HEADER -->
    <div class="h-16 bg-white border-b flex items-center justify-between px-6">

        <div class="text-lg font-semibold text-gray-800">
            Phone Verification
        </div>

    </div>

    <!-- ✅ CONTENT -->
    <div class="flex-1 flex items-center justify-center p-6">

        <div class="bg-white rounded-2xl shadow-sm border border-green-50 p-6 w-full max-w-sm">

            <!-- TITLE -->
            <div class="text-lg font-semibold text-gray-900 mb-1">
                Phone Verification
            </div>

            <div class="text-sm text-gray-500 mb-5">
                Verify your phone number to continue
            </div>

            <!-- ✅ SEND OTP -->
            <button
                type="button"
                (click)="sendOTP()"
                [disabled]="loading"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition">

                {{ loading ? 'Sending OTP...' : 'Send OTP' }}

            </button>

            <!-- ✅ OTP INPUT -->
            <input
                type="text"
                [(ngModel)]="otp"
                placeholder="Enter OTP"
                class="w-full mt-4 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-500 text-sm"
            />

            <!-- ✅ VERIFY OTP -->
            <button
                type="button"
                (click)="verifyOTP()"
                [disabled]="loading || !otp"
                class="w-full mt-3 border border-green-600 text-green-600 hover:bg-green-50 font-semibold py-3 rounded-xl transition">

                {{ loading ? 'Verifying...' : 'Verify OTP' }}

            </button>

            <!-- ✅ ERROR MESSAGE -->
            <div
                *ngIf="errorMessage"
                class="text-red-500 text-sm mt-3 text-center">

                {{ errorMessage }}

            </div>

            <!-- ✅ SUCCESS MESSAGE -->
            <div
                *ngIf="successMessage"
                class="text-green-600 text-sm mt-3 text-center">

                {{ successMessage }}

            </div>

        </div>

    </div>

</div>
