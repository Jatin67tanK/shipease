<div
  [class.w-64]="!collapsed"
  [class.w-20]="collapsed"
  class="h-screen flex flex-col bg-white border-r border-slate-100 transition-all duration-300 shadow-sm">

  <!-- Header -->
  <div class="flex items-center justify-between p-4 border-b border-slate-100">
    <div class="flex items-center gap-3 overflow-hidden">
      <span class="text-2xl flex-shrink-0">🚚</span>
      <div *ngIf="!collapsed" class="leading-tight">
        <div class="font-bold text-base text-slate-800">ShipEase</div>
        <div class="text-xs text-blue-600 font-medium">Delivery Staff</div>
      </div>
    </div>
    <button (click)="onToggle()"
      class="p-2 rounded-lg hover:bg-slate-100 transition text-slate-500">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>

  <!-- Menu -->
  <nav class="flex flex-col p-3 gap-1 flex-1">
    <a *ngFor="let item of menuItems"
      [routerLink]="item.link"
      routerLinkActive="bg-blue-50 text-blue-700 font-medium"
      class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition text-slate-600 text-sm">
      <span class="text-lg flex-shrink-0">{{ item.icon }}</span>
      <span *ngIf="!collapsed" class="whitespace-nowrap">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Logout -->
  <div class="p-3 border-t border-slate-100">
    <button (click)="logout()"
      class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-red-50 text-red-500 transition text-sm">
      <span class="text-lg flex-shrink-0">🚪</span>
      <span *ngIf="!collapsed" class="whitespace-nowrap">Log out</span>
    </button>
  </div>
</div>
