<div class="p-6 max-w-2xl mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-800">My Profile</h1>
    <p class="text-slate-500 text-sm mt-1">Manage your delivery staff information</p>
  </div>

  <div *ngIf="isLoading" class="flex justify-center py-20">
    <div class="w-8 h-8 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
  </div>

  <div *ngIf="!isLoading" class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">

    <!-- Profile Header -->
    <div class="bg-gradient-to-r from-blue-600 to-blue-500 px-6 py-8 text-white">
      <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl mb-4">👷</div>
      <h2 class="text-xl font-bold">{{ profile?.name }}</h2>
      <p class="text-blue-100 text-sm mt-1">{{ profile?.employee_id }} · Delivery Staff</p>
    </div>

    <!-- Info / Edit -->
    <div class="px-6 py-6">

      <div *ngIf="!editMode" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Email</p>
            <p class="text-sm text-slate-700">{{ profile?.email }}</p>
          </div>
          <div>
            <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Phone</p>
            <p class="text-sm text-slate-700">{{ profile?.phone_number }}</p>
          </div>
          <div>
            <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">State</p>
            <p class="text-sm text-slate-700">{{ profile?.state }}</p>
          </div>
          <div>
            <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Country</p>
            <p class="text-sm text-slate-700">{{ profile?.country }}</p>
          </div>
        </div>

        <button (click)="editMode = true"
          class="mt-4 bg-blue-600 text-white px-6 py-2.5 rounded-xl text-sm font-medium hover:bg-blue-700 transition">
          Edit Profile
        </button>
      </div>

      <div *ngIf="editMode" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="text-xs font-semibold text-slate-600 block mb-1.5">Full Name</label>
            <input [(ngModel)]="form.name" type="text"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-600 block mb-1.5">Phone</label>
            <input [(ngModel)]="form.phone_number" type="tel"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-600 block mb-1.5">State</label>
            <input [(ngModel)]="form.state" type="text"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-600 block mb-1.5">Country</label>
            <input [(ngModel)]="form.country" type="text"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>
        </div>

        <div class="flex gap-3 mt-4">
          <button (click)="editMode = false"
            class="border border-slate-200 text-slate-600 px-5 py-2.5 rounded-xl text-sm font-medium hover:bg-slate-50 transition">
            Cancel
          </button>
          <button (click)="saveProfile()" [disabled]="isSaving"
            class="bg-blue-600 text-white px-6 py-2.5 rounded-xl text-sm font-medium hover:bg-blue-700 transition disabled:opacity-50">
            {{ isSaving ? 'Saving...' : 'Save Changes' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
